<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 계산기</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4F46E5" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="sticky-top">
        <header class="header">
          <h1>장바구니 계산기</h1>
          <div class="header-buttons">
            <button class="install-btn" type="button" style="display: none;">설치</button>
            <button class="camera-btn" type="button" aria-label="가격표 촬영">촬영</button>
            <button class="settings-btn" type="button">설정</button>
            <button class="clear-btn" type="button">모두 삭제</button>
          </div>
          <input class="photo-input" type="file" accept="image/*" capture="environment" hidden />
        </header>

        <div class="scan-panel" hidden style="display: none;">
          <img class="scan-preview" alt="촬영한 가격표" hidden style="display: none;" />
          <div class="scan-copy">
            <div class="scan-status">가격표를 읽는 중입니다.</div>
            <div class="scan-result" hidden></div>
            <button class="area-select-btn" type="button" hidden>영역 지정</button>
          </div>
        </div>

        <div class="table-header total-row">
          <div class="col">
            <span class="label">총 품목 수</span>
            <span class="value count-value">0개</span>
          </div>
          <div class="col">
            <span class="label">금액 합계</span>
            <span class="value price-value">0원</span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div class="item-column-header" aria-hidden="true">
          <div class="col name-col">상품명</div>
          <div class="col price-col">단가</div>
          <div class="col count-col">수량</div>
          <div class="col total-col">금액</div>
          <div class="col delete-col"></div>
        </div>
        <div class="items-list"></div>
        <div class="manual-actions">
          <button class="manual-add-btn" type="button">수동 입력 추가</button>
        </div>
      </div>

      <div class="region-modal" hidden style="display: none;">
        <div class="region-dialog" role="dialog" aria-modal="true" aria-label="OCR 영역 지정">
          <div class="region-header">
            <strong>가격표 영역 지정</strong>
            <button class="region-close-btn" type="button" aria-label="닫기">×</button>
          </div>
          <div class="region-help">1단계: 상품명 영역을 드래그하세요.</div>
          <div class="region-steps" aria-live="polite">
            <div class="region-step name-step active">1 상품명</div>
            <div class="region-step price-step">2 가격</div>
          </div>
          <div class="region-image-wrap">
            <img class="region-image" alt="영역을 지정할 가격표" />
            <div class="region-box name-region-box" hidden>상품명</div>
            <div class="region-box price-region-box" hidden>가격</div>
            <div class="region-box draft-region-box" hidden></div>
          </div>
          <div class="region-actions">
            <button class="region-run-btn" type="button">OCR 후 상품 추가</button>
            <button class="region-reset-btn" type="button">다시 지정</button>
          </div>
        </div>
      </div>

      <div class="settings-modal" hidden style="display: none;">
        <div class="settings-dialog" role="dialog" aria-modal="true" aria-label="설정">
          <div class="settings-header">
            <strong>설정</strong>
            <button class="settings-close-btn" type="button" aria-label="닫기">×</button>
          </div>
          <label class="font-setting" for="font-scale-range">
            <span>전체 글씨 크기</span>
            <output class="font-scale-value" for="font-scale-range">100%</output>
          </label>
          <input
            id="font-scale-range"
            class="font-scale-range"
            type="range"
            min="85"
            max="130"
            step="5"
            value="100"
          />
          <div class="settings-actions">
            <button class="font-reset-btn" type="button">기본값</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
