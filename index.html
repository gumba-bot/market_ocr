<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장바구니 계산기</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#4F46E5" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <div class="sticky-top">
        <header class="header">
          <h1>장바구니 계산기</h1>
          <div class="header-buttons">
            <button class="install-btn" type="button" style="display: none;">설치</button>
            <button class="camera-btn" type="button">가격표 촬영</button>
            <button class="clear-btn" type="button">모두 삭제</button>
          </div>
          <input class="photo-input" type="file" accept="image/*" capture="environment" hidden />
        </header>

        <div class="scan-panel" hidden>
          <img class="scan-preview" alt="촬영한 가격표" hidden />
          <div class="scan-copy">
            <div class="scan-status">가격표를 읽는 중입니다.</div>
            <div class="scan-result" hidden></div>
            <button class="area-select-btn" type="button" hidden>영역 지정</button>
          </div>
        </div>

        <div class="table-header total-row">
          <div class="col">
            <span class="label">총 품목 수</span>
            <span class="value count-value">0개</span>
          </div>
          <div class="col">
            <span class="label">총 합계</span>
            <span class="value price-value">0원</span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div class="items-list"></div>
      </div>

      <div class="region-modal" hidden>
        <div class="region-dialog" role="dialog" aria-modal="true" aria-label="OCR 영역 지정">
          <div class="region-header">
            <strong>영역 지정 OCR</strong>
            <button class="region-close-btn" type="button" aria-label="닫기">×</button>
          </div>
          <div class="region-toolbar">
            <button class="region-mode-btn active" type="button" data-mode="name">상품명</button>
            <button class="region-mode-btn" type="button" data-mode="price">가격</button>
          </div>
          <div class="region-help">상품명 영역과 최종가격 영역을 각각 드래그하세요.</div>
          <div class="region-image-wrap">
            <img class="region-image" alt="영역을 지정할 가격표" />
            <div class="region-box name-region-box" hidden>상품명</div>
            <div class="region-box price-region-box" hidden>가격</div>
            <div class="region-box draft-region-box" hidden></div>
          </div>
          <div class="region-actions">
            <button class="region-run-btn" type="button">선택 영역 OCR</button>
            <button class="region-reset-btn" type="button">다시 지정</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
